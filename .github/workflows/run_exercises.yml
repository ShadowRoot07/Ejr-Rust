name: Neon Ataraxia - Evaluador de Ejercicios

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  execute-rust:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el repositorio
      uses: actions/checkout@v4

    - name: 2. Instalar el Toolchain de Rust
      uses: dtolnay/rust-toolchain@stable

    - name: 3. Escanear y Ejecutar Todos los Ejercicios
      run: |
        echo "========================================================"
        echo "    INICIANDO ESCANEO DE PROYECTOS RUST...             "
        echo "========================================================"
        
        # Encontrar de forma infalible todos los directorios que contienen un Cargo.toml
        # Excluyendo la carpeta interna de target si existiera por error
        ALL_PROJECTS=$(find . -name "Cargo.toml" -not -path "*/target/*" | xargs -I {} dirname {} | sort -u)

        if [ -z "$ALL_PROJECTS" ]; then
          echo "❌ No se encontró ningún proyecto con Cargo.toml en el repositorio."
          exit 1
        fi

        # Iterar secuencialmente sobre cada proyecto encontrado
        for project in $ALL_PROJECTS; do
          # Limpiar el './' inicial de la ruta para que se vea estético en la consola
          PROJECT_NAME=$(echo "$project" | sed 's|^\./||')
          
          echo ""
          echo "========================================================"
          echo " ▶️ EJECUTANDO: $PROJECT_NAME"
          echo "========================================================"
          
          # Entrar al proyecto, compilarlo en modo silencioso para no saturar la consola y correrlo
          cd "$project"
          cargo run -q --release
          cd - > /dev/null
        done
        
        echo ""
        echo "========================================================"
        echo " ✅ TODOS LOS EJERCICIOS SE EJECUTARON CORRECTAMENTE    "
        echo "========================================================"

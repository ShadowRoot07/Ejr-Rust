name: Neon Ataraxia - Evaluador de Ejercicios Nativos

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  execute-rust:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar el repositorio
      uses: actions/checkout@v4

    - name: 2. Instalar el Toolchain de Rust
      uses: dtolnay/rust-toolchain@stable

    - name: 3. Buscar y Compilar todos los main.rs
      run: |
        echo "========================================================"
        echo "    INICIANDO ESCANEO DE ARCHIVOS RUST (rustc)...       "
        echo "========================================================"
        
        # Buscar de forma infalible todos los archivos main.rs en el repo
        ALL_MAINS=$(find . -name "main.rs" | sort)

        if [ -z "$ALL_MAINS" ]; then
          echo "❌ No se encontró ningún archivo 'main.rs' en el repositorio."
          exit 1
        fi

        # Iterar sobre cada archivo main.rs encontrado
        for main_file in $ALL_MAINS; do
          # Obtener el nombre de la carpeta padre (ej. hello-edit o variables)
          PROJECT_NAME=$(basename $(dirname $(dirname "$main_file")))
          
          echo ""
          echo "========================================================"
          echo " ▶️ EJECUTANDO EJERCICIO: $PROJECT_NAME"
          echo "========================================================"
          
          # Compilar el archivo directamente generando un binario temporal llamado 'ejercicio_ejecutable'
          rustc "$main_file" -o ejercicio_ejecutable
          
          # Ejecutar el binario generado
          ./ejercicio_ejecutable
          
          # Limpiar el binario para que no estorbe
          rm ejercicio_ejecutable
        done
        
        echo ""
        echo "========================================================"
        echo " ✅ TODOS LOS SCRIPTS SE EVALUARON CON ÉXITO            "
        echo "========================================================"
